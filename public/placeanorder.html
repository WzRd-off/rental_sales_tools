<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Оформлення замовлення | БудІнструмент</title>
</head>
<body style="background-color: #f8f9fa;">
<div id="header"></div>

    <main class="container mt-8 mb-16">
        <div class="mb-6">
            <h1 class="section-title" style="font-size: 2rem;">Оформлення замовлення</h1>
        </div>

        <!-- Главный контейнер - одна колонка (вертикальное расположение) -->
        <div style="display: grid; grid-template-columns: 1fr; gap: var(--sp-8, 2rem); align-items: start;">
            
            <!-- Форма с блоками 1, 2, 3 -->
            <form id="checkout-form" class="flex flex-direction-column gap-8">
                
                <section class="card p-6" id="step-1-contact">
                    <h2 class="font-display text-lg mb-6">1. Контактні дані</h2>
                    
                    <div class="flex gap-6 mb-6" style="border-bottom: 1px solid var(--c-border); padding-bottom: 10px;">
                        <label class="cursor-pointer" style="color: var(--c-brand); border-bottom: 2px solid var(--c-brand); padding-bottom: 10px; margin-bottom: -11px;">
                            <input type="radio" name="customer_type" value="new" checked style="display: none;" id="type-new"> 
                            Я новий покупець
                        </label>
                        <label class="cursor-pointer text-3">
                            <input type="radio" name="customer_type" value="returning" style="display: none;" id="type-returning"> 
                            Я постійний покупець
                        </label>
                    </div>

                    <div class="flex flex-direction-column gap-4">
                        <input type="text" id="user-name" class="input p-4" placeholder="ПІБ" required>
                        <input type="email" id="user-email" class="input p-4" placeholder="E-mail" required>
                        <input type="tel" id="user-phone" class="input p-4" placeholder="Телефон" required>
                    </div>
                </section>

                <section class="card p-6" id="step-2-delivery">
                    <h2 class="font-display text-lg mb-4">2. Доставка</h2>
                    
                    <div class="flex items-center gap-2 mb-4 text-sm">
                        <span>📍 Ваше місто:</span>
                        <a href="#" class="text-brand font-bold" style="text-decoration: underline;" id="select-city">Київ</a>
                    </div>
                    
                    <div class="flex gap-4 mb-6 text-xs text-brand" id="quick-cities">
                        <span class="cursor-pointer">Дніпро</span>
                        <span class="cursor-pointer">Запоріжжя</span>
                        <span class="cursor-pointer">Київ</span>
                        <span class="cursor-pointer">Львів</span>
                        <span class="cursor-pointer">Одеса</span>
                    </div>

                    <div class="flex flex-direction-column gap-3" id="delivery-options">
                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="delivery" value="pickup" checked id="del-pickup">
                            <div style="flex-grow: 1;">
                                <div class="font-bold">Самовивіз з магазину</div>
                                <div class="text-xs text-3 mt-1">м. Київ, вул. Будівельників, 14</div>
                            </div>
                            <div class="font-bold text-sm">Безкоштовно</div>
                        </label>

                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="delivery" value="ukrposhta" id="del-ukrposhta">
                            <div style="flex-grow: 1;">
                                <div class="font-bold">Доставка у відділення Укрпошти</div>
                                <div class="text-xs text-3 mt-1">Уточніть можливість доставки у менеджера</div>
                            </div>
                            <div class="font-bold text-sm">від 65 ₴</div>
                        </label>

                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="delivery" value="novaposhta" id="del-novaposhta">
                            <div style="flex-grow: 1;">
                                <div class="font-bold" style="color: #db2c27;">Нова пошта</div>
                            </div>
                            <div class="font-bold text-sm">від 70 ₴</div>
                        </label>

                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="delivery" value="courier" id="del-courier">
                            <div style="flex-grow: 1;">
                                <div class="font-bold">Кур'єрська доставка по Києву</div>
                            </div>
                            <div class="font-bold text-sm">від 400 ₴</div>
                        </label>
                    </div>
                </section>

                <section class="card p-6" id="step-3-payment">
                    <h2 class="font-display text-lg mb-6">3. Оплата</h2>

                    <div class="flex flex-direction-column gap-3" id="payment-options">
                        
                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="payment" value="cash" checked id="pay-cash">
                            <div class="font-bold">Готівкою</div>
                        </label>

                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="payment" value="cod" id="pay-cod">
                            <div>
                                <div class="font-bold">Накладений платіж</div>
                                <div class="text-xs text-3 mt-1">З додатковою комісією за пересилання коштів</div>
                            </div>
                        </label>

                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="payment" value="terminal" id="pay-terminal">
                            <div>
                                <div class="font-bold">Термінал</div>
                                <div class="text-xs text-3 mt-1">При оплаті карткою по терміналу враховуйте комісію 2%</div>
                            </div>
                        </label>

                        <label class="flex items-center gap-4 p-4 border cursor-pointer hover-border-brand" style="border-radius: var(--rd-md);">
                            <input type="radio" name="payment" value="online" id="pay-online">
                            <div style="flex-grow: 1;">
                                <div class="font-bold">Онлайн</div>
                                <div class="text-xs text-3 mt-1">Оплата карткою, Apple Pay, Google Pay</div>
                            </div>
                            <div class="flex gap-2 text-xl">💳 📱</div>
                        </label>
                    </div>
                </section>
            </form>

            <!-- Сайдбар с заказом - теперь под формой (вертикально) -->
            <aside style="position: sticky; top: var(--sp-4);">
                <div class="card p-6 shadow-sm border" id="order-summary-block">
                    
                    <div class="flex-between mb-6 pb-4" style="border-bottom: 1px solid var(--c-border);">
                        <h3 class="font-display text-lg">Ваше замовлення</h3>
                        <a href="cart.html" class="text-brand text-xs">Редагувати</a>
                    </div>

                    <div class="flex gap-4 mb-6">
                        <div class="product-card__img" style="width: 60px; height: 60px; flex-shrink: 0; background: none;">
                            <div class="product-card__icon" style="font-size: 1.5rem;">🛠️</div>
                        </div>
                        <div style="flex-grow: 1;">
                            <div class="text-sm mb-1" id="summary-product-name">Перфоратор Bosch GBH 2-28</div>
                            <div class="text-xs text-3 mb-2">Код товару: <span id="summary-product-sku">363383</span></div>
                            <div class="flex-between items-center">
                                <span class="text-sm" id="summary-product-qty">1 шт</span>
                                <div>
                                    <span class="text-xs text-3" style="text-decoration: line-through;" id="summary-old-price">14 500 ₴</span>
                                    <span class="font-bold text-danger text-lg ml-2" id="summary-new-price">13 000 ₴</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-6 pt-4" style="border-top: 1px solid var(--c-border);">
                        <div class="flex-between mb-3 text-sm">
                            <span class="text-3">Товарів у кошику</span>
                            <span class="num" id="summary-total-qty">1 шт</span>
                        </div>
                        <div class="flex-between mb-3 text-sm">
                            <span class="text-3">Сума замовлення</span>
                            <span class="num" id="summary-total-price">14 500 ₴</span>
                        </div>
                        <div class="flex-between mb-4 text-sm">
                            <span class="text-danger">Знижка</span>
                            <span class="num text-danger" id="summary-total-discount">-1 500 ₴</span>
                        </div>
                        
                        <div class="flex-between mb-6">
                            <span class="font-display text-lg">Разом</span>
                            <span class="num font-bold text-xl" id="summary-final-price">13 000 ₴</span>
                        </div>
                    </div>

                    <button type="submit" form="checkout-form" class="btn btn-block btn-lg" style="background-color: #8da93e; color: white; border-radius: 4px; border: none; font-weight: bold;" id="btn-submit-order">
                        ОФОРМИТИ ЗАМОВЛЕННЯ
                    </button>
                </div>
            </aside>
            
        </div>
    </main>

<div id="footer"></div>
