<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Кошик | БудІнструмент</title>
</head>
<body>
<div id="header"></div>

    <main class="container mt-8">
        <div class="mb-8">
            <div class="section-eyebrow">Shopping Cart</div>
            <h1 class="section-title">Мій кошик</h1>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 350px; gap: var(--sp-6); align-items: start;">
            
            <div id="cart-items-container" class="flex flex-direction-column gap-4">
                
                

            </div>

            <aside>
                <div class="card">
                    <div class="card-header font-display uppercase tracking-wider">Підсумок замовлення</div>
                    <div class="card-body">
                        <div class="flex-between mb-3 text-sm">
                            <span class="text-3">Товари</span>
                            <span id="cart-total-count" class="num">1 шт</span>
                        </div>
                        <div class="flex-between mb-6 text-sm">
                            <span class="text-3">Знижка</span>
                            <span id="cart-total-discount" class="num text-danger">-1 500 ₴</span>
                        </div>

                        <div class="flex-between mb-8" style="border-top: 1px solid var(--c-border); padding-top: 1rem;">
                            <span class="font-bold">РАЗОМ:</span>
                            <span id="cart-total-price" class="num text-xl text-main">13 000 ₴</span>
                        </div>

                        <button id="btn-checkout" class="btn btn-dark btn-block btn-lg">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>
<div id="footer"></div>
<script src="./js/utils.js"></script>
<script src="./js/header.js"></script>
<script src="./js/cart.js"></script>
</body>
</html>
