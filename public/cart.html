<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Кошик | БудІнструмент</title>
</head>
<body>
<div id="header"></div>

<main class="container mt-8" style="margin-bottom: 100px;">
    <div class="mb-8">
        <div class="section-eyebrow">Shopping Cart</div>
        <h1 class="section-title">Мій кошик</h1>
    </div>

    <!-- ПОРОЖНІЙ КОШИК -->
    <div id="cart-empty" style="display: none; text-align: center; padding: 80px 0;">
        <div style="font-size: 4rem; margin-bottom: 16px;">🛒</div>
        <p style="color: #94a3b8; font-size: 1.2rem; margin-bottom: 24px;">Кошик порожній</p>
        <a href="catalog.html" class="btn btn-primary">ПЕРЕЙТИ ДО КАТАЛОГУ</a>
    </div>

    <!-- КОШИК З ТОВАРАМИ -->
    <div id="cart-content" style="display: none; display: grid; grid-template-columns: 1fr 350px; gap: var(--sp-6); align-items: start;">

        <div>
            <!-- СПИСОК ТОВАРІВ -->
            <div id="cart-items-container" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px;"></div>

            <!-- ФОРМА ОФОРМЛЕННЯ -->
            <div class="card">
                <div class="card-header font-display uppercase tracking-wider">Дані для замовлення</div>
                <div class="card-body">
                    <form id="checkout-form" style="display: flex; flex-direction: column; gap: 16px;">

                        <div>
                            <label style="display: block; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 6px;">Ім'я та прізвище</label>
                            <input type="text" id="user-name" class="input" placeholder="Іванов Іван" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                            <span id="name-error" style="display: none; font-size: 12px; color: #dc2626; margin-top: 4px;">Введіть коректне ім'я (мінімум 3 символи)</span>
                        </div>

                        <div>
                            <label style="display: block; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 6px;">Телефон</label>
                            <input type="text" id="user-phone" class="input" placeholder="0671234567" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                            <span id="phone-error" style="display: none; font-size: 12px; color: #dc2626; margin-top: 4px;">Введіть коректний номер (10 цифр)</span>
                        </div>

                        <div>
                            <label style="display: block; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 6px;">Адреса доставки</label>
                            <input type="text" id="user-address" class="input" placeholder="м. Київ, вул. Хрещатик, 1" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>

                    </form>
                </div>
            </div>
        </div>

        <!-- ПІДСУМОК -->
        <aside>
            <div class="card" style="position: sticky; top: 20px;">
                <div class="card-header font-display uppercase tracking-wider">Підсумок замовлення</div>
                <div class="card-body">
                    <div class="flex-between mb-3 text-sm">
                        <span class="text-3">Товари</span>
                        <span id="cart-total-count" class="num">0 шт</span>
                    </div>
                    <div class="flex-between mb-6" style="border-top: 1px solid var(--c-border); padding-top: 1rem;">
                        <span class="font-bold">РАЗОМ:</span>
                        <span id="cart-total-price" class="num text-xl text-main">0 ₴</span>
                    </div>
                    <button id="submit-btn" class="btn btn-dark btn-block btn-lg" onclick="document.getElementById('checkout-form').dispatchEvent(new Event('submit', {cancelable: true}))">
                        ОФОРМИТИ ЗАМОВЛЕННЯ
                    </button>
                </div>
            </div>
        </aside>
    </div>
</main>

<div id="footer"></div>

<script src="./js/utils.js"></script>
<script src="./js/header.js"></script>
<script src="./js/cart.js"></script>
</body>
</html>
